global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'local'
    environment: 'development'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ingestion'
    static_configs:
      - targets: ['ingestion:8000']
    metrics_path: '/metrics'

  - job_name: 'consumer'
    static_configs:
      - targets: ['consumer:9090']
    metrics_path: '/metrics'

  - job_name: 'autoscaler'
    static_configs:
      - targets: ['autoscaler:9090']
    metrics_path: '/metrics'

